name: Export UWP (Xbox sideload package)

# Dispara manualmente pela aba "Actions" do GitHub (web ou app mobile),
# ou automaticamente a cada push na branch main.
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  # ----------------------------------------------------------------------
  # JOB 1: roda em Linux. Usa o Godot 3.5 headless para gerar o pacote UWP
  # "cru" (nao assinado) a partir do preset "UWP Xbox Series S" definido
  # em export_presets.cfg. Isso e o que a documentacao oficial do Godot
  # confirma ser possivel a partir de qualquer plataforma, nao so Windows.
  # ----------------------------------------------------------------------
  export_uwp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Exportar projeto para UWP
        uses: firebelley/godot-export@v8.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot-builds/releases/download/3.5.3-stable/Godot_v3.5.3-stable_linux_headless.64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot-builds/releases/download/3.5.3-stable/Godot_v3.5.3-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          presets_to_export: "UWP Xbox Series S"
          use_godot_3: true
          use_preset_export_path: true

      - name: Localizar pacote UWP exportado
        id: find_appx
        shell: bash
        run: |
          appx="$(find "$GITHUB_WORKSPACE" -type f -name '*.appx' | head -n 1)"
          if [ -z "$appx" ]; then
            echo "Nenhum .appx encontrado depois da exportacao."
            find "$GITHUB_WORKSPACE" -maxdepth 4 -type f | sort | tail -200
            exit 1
          fi
          echo "appx_path=$appx" >> "$GITHUB_OUTPUT"
          echo "Pacote encontrado: $appx"

      - name: Subir o pacote nao assinado como artefato
        uses: actions/upload-artifact@v4
        with:
          name: uwp-package-unsigned
          path: ${{ steps.find_appx.outputs.appx_path }}
          if-no-files-found: error

  # ----------------------------------------------------------------------
  # JOB 2: roda em Windows. Pega o pacote gerado no job acima, cria um
  # certificado de teste autoassinado, e assina o .appx para permitir
  # sideload via Dev Mode no Xbox.
  # ----------------------------------------------------------------------
  sign_package:
    needs: export_uwp
    runs-on: windows-latest
    steps:
      - name: Baixar o pacote nao assinado
        uses: actions/download-artifact@v4
        with:
          name: uwp-package-unsigned
          path: UWP_Export

      - name: Criar certificado de teste autoassinado
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject "CN=AlyssonDaPaz" `
            -KeyUsage DigitalSignature `
            -FriendlyName "MegaManX8UWP Test Certificate" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3","2.5.29.19={text}")
          $password = ConvertTo-SecureString -String "teste1234" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath "MegaManX8Test.pfx" -Password $password
          Export-Certificate -Cert $cert -FilePath "MegaManX8Test.cer"

      - name: Localizar o .appx gerado
        id: find_appx
        shell: pwsh
        run: |
          $appx = Get-ChildItem -Path "UWP_Export" -Filter "*.appx" -Recurse | Select-Object -First 1
          if (-not $appx) {
            Write-Error "Nenhum .appx encontrado em UWP_Export. Verifique se o job de export terminou com sucesso."
            exit 1
          }
          echo "appx_path=$($appx.FullName)" >> $env:GITHUB_OUTPUT

      - name: Assinar o pacote
        shell: pwsh
        run: |
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Filter "signtool.exe" -Recurse |
            Where-Object { $_.FullName -like "*x64*" } | Select-Object -First 1
          if (-not $signtool) {
            Write-Error "signtool.exe nao encontrado. O Windows SDK pode nao estar no runner; veja a secao de troubleshooting do tutorial."
            exit 1
          }
          & $signtool.FullName sign /fd SHA256 /a /f "MegaManX8Test.pfx" /p "teste1234" "${{ steps.find_appx.outputs.appx_path }}"

      - name: Subir pacote assinado + certificado
        uses: actions/upload-artifact@v4
        with:
          name: uwp-package-signed-for-sideload
          path: |
            ${{ steps.find_appx.outputs.appx_path }}
            MegaManX8Test.cer
          if-no-files-found: error
